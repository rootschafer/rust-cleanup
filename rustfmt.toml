# The repo's formatting, checked in so `cargo fmt --check` means the same thing
# here as it does on CI. Without this file rustfmt falls back to its own
# defaults there (spaces, width 100) while picking up a contributor's global
# config locally — which is exactly how CI's first run went red.
#
# Stable-only options on purpose: CI runs stable rustfmt, and unstable keys are
# ignored with a warning rather than applied, so keeping any here would put the
# two out of step again.

max_width = 120
hard_tabs = true
tab_spaces = 4

# The width knobs below are only consulted with the heuristics off.
use_small_heuristics = "Off"
fn_call_width = 80
attr_fn_like_width = 70
struct_lit_width = 50
struct_variant_width = 35
array_width = 80
chain_width = 60
single_line_if_else_max_width = 50
single_line_let_else_max_width = 50

# Import order is authored, not derived: the modules are listed in pipeline
# order in places, and resorting them would lose that.
reorder_imports = false
