# Test CI: runs the same checks the review-handoff lists as the local gate.
# (Release builds are separate — see release.yml, generated by dist.)
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      # Fails on a broken intra-doc link, so a bad crate-doc reaches neither
      # docs.rs nor a release. Warnings-as-errors matches how docs.rs builds.
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      # --no-fail-fast so one run reports every broken test binary. Without it
      # cargo stops at the first, which hid the integration results behind a
      # docs failure on the Windows job's first run.
      - run: cargo test --no-fail-fast
